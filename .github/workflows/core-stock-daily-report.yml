name: Core stock daily report

on:
  schedule:
    # 17:40 Asia/Shanghai on weekdays, after A-share close data should be available.
    - cron: "40 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: core-stock-daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 -m unittest discover -s financial-research/tests

      - name: Install Longbridge CLI
        run: |
          set -euo pipefail
          curl -sSL https://open.longbridge.com/longbridge/longbridge-terminal/install | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Restore Longbridge auth
        env:
          LONGBRIDGE_CLI_AUTH_B64: ${{ secrets.LONGBRIDGE_CLI_AUTH_B64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.longbridge/openapi"
          if [ -z "${LONGBRIDGE_CLI_AUTH_B64}" ]; then
            echo "::warning::Missing secret LONGBRIDGE_CLI_AUTH_B64; report generation can only succeed if Longbridge does not require auth."
            exit 0
          fi
          printf '%s' "${LONGBRIDGE_CLI_AUTH_B64}" | base64 -d > "$HOME/.longbridge/openapi/cli-auth"
          chmod 600 "$HOME/.longbridge/openapi/cli-auth"

      - name: Check Longbridge status
        run: |
          set +e
          longbridge auth status --format json
          longbridge check --format json

      - name: Run daily report
        id: report
        run: |
          set +e
          python3 financial-research/scripts/core_four_daily_report.py
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          echo "REPORT_EXIT_CODE=${status}" >> "$GITHUB_ENV"
          if [ "${status}" -ne 0 ] && [ "${status}" -ne 4 ]; then
            exit "${status}"
          fi

      - name: Persist successful report outputs
        if: steps.report.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            financial-research/reports/*_core_four_daily_report.md \
            financial-research/reports/*_core_four_daily_dashboard.html \
            financial-research/reports/latest_core_four_daily_report.md \
            financial-research/reports/latest_core_four_daily_dashboard.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update core stock daily report $(date +%Y-%m-%d)"
            if ! git push; then
              echo "::warning::Failed to push generated report outputs; Pages will still deploy the current artifact."
            fi
          fi

      - name: Prepare Pages site
        run: |
          set -euo pipefail
          python3 financial-research/scripts/prepare_core_four_pages.py \
            --date "$(date +%Y%m%d)" \
            --report-exit-code "${REPORT_EXIT_CODE:-999}" \
            --site-dir public

      - name: Publish docs site
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "${PAGES_PAT}" ]; then
            git remote set-url origin "https://x-access-token:${PAGES_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          publish_dir="$(mktemp -d)"
          cp -R public/. "${publish_dir}/"
          touch "${publish_dir}/.nojekyll"

          rm -rf docs
          mkdir -p docs
          cp -R "${publish_dir}/". docs/
          git add docs
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Publish core stock daily dashboard $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi
