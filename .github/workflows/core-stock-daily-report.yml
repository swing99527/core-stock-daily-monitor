name: Core stock daily report

on:
  schedule:
    # 17:40 Asia/Shanghai on weekdays, after A-share close data should be available.
    - cron: "40 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: core-stock-daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64, core-stock-longbridge]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Expose local CLI tools
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Check local Python
        run: python3 --version

      - name: Run unit tests
        run: python3 -m unittest discover -s financial-research/tests

      - name: Check Longbridge status
        run: |
          set +e
          longbridge auth status --format json
          longbridge check --format json

      - name: Run daily report
        id: report
        run: |
          set +e
          python3 financial-research/scripts/core_four_daily_report.py
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          echo "REPORT_EXIT_CODE=${status}" >> "$GITHUB_ENV"
          if [ "${status}" -ne 0 ] && [ "${status}" -ne 4 ]; then
            exit "${status}"
          fi

      - name: Stage successful report outputs
        if: steps.report.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          git add \
            financial-research/history/core_four_daily.sqlite3 \
            financial-research/reports/*_core_four_daily_report.md \
            financial-research/reports/*_core_four_daily_dashboard.html \
            financial-research/reports/latest_core_four_daily_report.md \
            financial-research/reports/latest_core_four_daily_dashboard.html

      - name: Stage history database
        if: steps.report.outputs.exit_code != '0'
        run: |
          set -euo pipefail
          if [ -f financial-research/history/core_four_daily.sqlite3 ]; then
            git add financial-research/history/core_four_daily.sqlite3
          fi

      - name: Prepare Pages site
        run: |
          set -euo pipefail
          python3 financial-research/scripts/prepare_core_four_pages.py \
            --date "$(date +%Y%m%d)" \
            --report-exit-code "${REPORT_EXIT_CODE:-999}" \
            --site-dir public

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Ensure GNU tar for Pages artifact
        run: |
          if ! command -v gtar >/dev/null 2>&1; then
            brew install gnu-tar
          fi
          gtar --version

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Publish docs site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"
          cp -R public/. "${publish_dir}/"
          touch "${publish_dir}/.nojekyll"

          rm -rf docs
          mkdir -p docs
          cp -R "${publish_dir}/". docs/
          git add docs
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Publish core stock daily report $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi
